<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Dark circle background -->
  <circle cx="100" cy="100" r="96" fill="#16161f"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="#2d2d42" stroke-width="2"/>

  <!-- Card fan: 3 overlapping playing cards -->
  <!-- Left card (rotated -18deg around bottom-center of card stack) -->
  <g transform="rotate(-18 100 130)">
    <rect x="62" y="48" width="56" height="78" rx="6" fill="#4f46e5" stroke="#818cf8" stroke-width="1.5"/>
    <!-- Card corner pips -->
    <rect x="69" y="55" width="8" height="8" rx="2" fill="#818cf8" opacity="0.7"/>
    <rect x="83" y="55" width="8" height="8" rx="2" fill="#818cf8" opacity="0.7"/>
    <!-- Center suit hint (small diamond) -->
    <polygon points="90,84 96,90 90,96 84,90" fill="#c7d2fe" opacity="0.5"/>
  </g>

  <!-- Right card (rotated +18deg) -->
  <g transform="rotate(18 100 130)">
    <rect x="62" y="48" width="56" height="78" rx="6" fill="#6366f1" stroke="#a5b4fc" stroke-width="1.5"/>
    <!-- Card corner pips -->
    <rect x="69" y="55" width="8" height="8" rx="2" fill="#a5b4fc" opacity="0.7"/>
    <rect x="83" y="55" width="8" height="8" rx="2" fill="#a5b4fc" opacity="0.7"/>
    <!-- Center suit hint (small heart) -->
    <path d="M90 86 C90 86 82 80 82 75 C82 71.7 84.7 69 88 69 C89.5 69 90.9 69.7 90 71 C91.1 69.7 92.5 69 94 69 C97.3 69 100 71.7 100 75 C100 80 90 86 90 86 Z"
          fill="#c7d2fe" opacity="0.5" transform="translate(0,4)"/>
  </g>

  <!-- Center / front card (no rotation) -->
  <rect x="70" y="40" width="60" height="84" rx="7" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- Card inner border -->
  <rect x="75" y="45" width="50" height="74" rx="5" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Front card: "A" in top-left corner -->
  <g fill="#1a1a2e">
    <!-- Small "A" top-left -->
    <path d="M80 52 L77 62 L79 62 L80 59 L82 59 L80 55.5 L82 59 L80 59 L79.5 62 L83 62 L80 52 Z"/>
    <rect x="78" y="57" width="4" height="1" rx="0.5"/>
  </g>

  <!-- Center large spade suit symbol -->
  <path d="
    M100 58
    C100 58 88 67 88 73
    C88 76.3 90.6 78 93.3 77.1
    C92.2 78.8 91.4 80.5 90 82
    L110 82
    C108.6 80.5 107.8 78.8 106.7 77.1
    C109.4 78 112 76.3 112 73
    C112 67 100 58 100 58
    Z
  " fill="#1a1a2e"/>

  <!-- Front card: small "A" bottom-right (rotated 180) -->
  <g fill="#1a1a2e" transform="rotate(180 100 100)">
    <path d="M80 52 L77 62 L79 62 L80 59 L82 59 L80 55.5 L82 59 L80 59 L79.5 62 L83 62 L80 52 Z"/>
    <rect x="78" y="57" width="4" height="1" rx="0.5"/>
  </g>

  <!-- Subtle shine on circle -->
  <ellipse cx="70" cy="55" rx="30" ry="15" fill="white" opacity="0.04"/>
</svg>
