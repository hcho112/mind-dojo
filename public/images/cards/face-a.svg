<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!--
    Decorative serif "A"
    Two diagonal strokes meeting at apex, crossbar, and foot serifs
  -->
  <g fill="currentColor">
    <!-- Left leg of A -->
    <path d="M32 8 L14 56 L21 56 L32 24 L43 56 L50 56 L32 8 Z"/>
    <!-- Crossbar -->
    <rect x="19" y="36" width="26" height="5" rx="1"/>
    <!-- Bottom-left serif -->
    <rect x="10" y="52" width="14" height="4" rx="1"/>
    <!-- Bottom-right serif -->
    <rect x="40" y="52" width="14" height="4" rx="1"/>
    <!-- Top cap serif -->
    <rect x="28" y="7" width="8" height="3" rx="1"/>
  </g>
</svg>
