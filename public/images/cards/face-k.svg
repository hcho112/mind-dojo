<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!--
    "K" letter with small crown above
    Crown: 3-point classic crown shape
    K: vertical stroke + diagonal arms
  -->
  <g fill="currentColor">
    <!-- Crown base band -->
    <rect x="20" y="8" width="24" height="4" rx="1"/>
    <!-- Crown left point -->
    <polygon points="22,12 20,4 26,8"/>
    <!-- Crown center point (tallest) -->
    <polygon points="32,12 29,2 35,2 38,12"/>
    <!-- Crown right point -->
    <polygon points="42,12 38,8 44,4"/>
    <!-- Crown base fill -->
    <rect x="20" y="8" width="24" height="5" rx="1"/>

    <!-- K vertical stem -->
    <rect x="14" y="20" width="7" height="36" rx="1"/>
    <!-- K top-right diagonal arm (upper) -->
    <path d="M21 38 L46 20 L50 20 L26 38 Z"/>
    <!-- K bottom-right diagonal arm (lower) -->
    <path d="M21 38 L50 56 L46 56 L21 42 Z"/>
    <!-- K serif bottom left -->
    <rect x="10" y="52" width="14" height="4" rx="1"/>
    <!-- K serif top left -->
    <rect x="10" y="20" width="14" height="4" rx="1"/>
  </g>
</svg>
