  <line x1="256" y1="362" x2="256" y2="452" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
  <line x1="60" y1="256" x2="150" y2="256" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
